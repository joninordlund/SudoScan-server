services:
  backend:
    build: ./backend
    # Emme enää avaa porttia 8000 suoraan maailmalle, Nginx hoitaa sen
    expose:
      - "8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./frontend:/app/frontend
    restart: always

  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'   # HTTP
      - '81:81'   # Hallintapaneeli
      - '443:443' # HTTPS
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
